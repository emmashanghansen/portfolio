<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" height="24" width="24"><g class="nc-int-icon js-nc-int-icon nc-int-icon-scale"><g class="nc-int-icon-a"><path d="M5 9H18.3333M5 15.6667H18.3333" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g><g class="nc-int-icon-b"><path d="M18 6L6 18M6 6L18 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g></g><script>function initIntIcon(i){if(i.classList.contains("js-nc-int-icon-loaded")) return;i.classList.add("js-nc-int-icon-loaded");i.closest("svg").addEventListener("click",function(n){i.classList.toggle("nc-int-icon-state-b")});};var intIcons=document.getElementsByClassName("js-nc-int-icon");for(var i=0;intIcons.length>i;i++){initIntIcon(intIcons[i]);}</script><style>.nc-int-icon-scale{--animation-duration:0.4s;}.nc-int-icon{position:relative;}.nc-int-icon-b{position: absolute;top: calc(50% - 0.5em);left: calc(50% - 0.5em);opacity: 0;}.nc-int-icon-a,.nc-int-icon-b{transform-origin:center center;}.nc-int-icon-scale .nc-int-icon-a,.nc-int-icon-scale .nc-int-icon-b{transition: opacity 0s calc(var(--animation-duration)/2), transform var(--animation-duration);}.nc-int-icon-scale .nc-int-icon-b{transform: scale(0.8);}.nc-int-icon-state-b .nc-int-icon-a{opacity: 0;}.nc-int-icon-state-b .nc-int-icon-b{opacity: 1;}.nc-int-icon-scale.nc-int-icon-state-b .nc-int-icon-a{transform: scale(0.8);}.nc-int-icon-scale.nc-int-icon-state-b .nc-int-icon-b{transform: scale(1);}</style></svg>